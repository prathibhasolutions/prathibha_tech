{% extends "admin/change_list.html" %}

{% block content %}
<style>
    .finance-summary {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    
    .summary-button {
        padding: 12px 20px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background-color: #f8f9fa;
        font-size: 14px;
        font-weight: 500;
        cursor: not-allowed;
        opacity: 0.6;
        min-width: 150px;
        text-align: center;
        margin-left: 8px;
        margin-right: 8px;
    }
    
    .summary-button.balance {
        background-color: #e8f4f8;
        border-color: #0c63e4;
        color: #0c63e4;
    }
    
    .summary-button.credits {
        background-color: #e8f5e9;
        border-color: #28a745;
        color: #28a745;
    }
    
    .summary-button.debits {
        background-color: #ffebee;
        border-color: #dc3545;
        color: #dc3545;
    }

    .summary-button.reason {
        background-color: #f3f4f6;
        border-color: #6c757d;
        color: #343a40;
        cursor: default;
        opacity: 1;
    }

    .debit-reason-summary-title {
        margin: 10px 0 8px 8px;
        font-size: 14px;
        font-weight: 600;
        color: #495057;
    }
</style>

<div class="finance-summary">
    <button class="summary-button balance" disabled>
        <strong>Current Balance</strong><br>
        {{ current_balance }}
    </button>
    <button class="summary-button credits" disabled>
        <strong>Total Credits</strong><br>
        {{ total_credits }}
    </button>
    <button class="summary-button debits" disabled>
        <strong>Total Debits</strong><br>
        {{ total_debits }}
    </button>
</div>

<div class="debit-reason-summary-title">Debit Breakdown (Selected Date Range)</div>
<div class="finance-summary">
    {% for item in debit_reason_totals %}
    <button class="summary-button reason" disabled>
        <strong>{{ item.label }}</strong><br>
        {{ item.amount }}
    </button>
    {% endfor %}
</div>

<div style="display: flex; justify-content: flex-end; align-items: center; margin-top: 48px; margin-right: 48px; margin-bottom: 32px;">
    <button onclick="printFinanceTable()" style="padding: 6px 18px; font-size: 15px;" class="btn btn-secondary">Print</button>
</div>

<script>
function printFinanceTable() {
    var table = document.querySelector('table');
    if (!table) {
        alert('No table found to print.');
        return;
    }
    // Clone table to remove checkbox column for print
    var clone = table.cloneNode(true);
    // Remove first column (checkbox) from header and rows
    var thead = clone.querySelector('thead');
    if (thead && thead.rows[0].cells[0].querySelector('input[type="checkbox"]')) {
        thead.rows[0].deleteCell(0);
    }
    var rows = clone.querySelectorAll('tbody tr');
    rows.forEach(function(row) {
        if (row.cells[0] && row.cells[0].querySelector('input[type="checkbox"]')) {
            row.deleteCell(0);
        }
    });
    var printWindow = window.open('', '', 'height=600,width=800');
    printWindow.document.write('<html><head><title>Print Finance Table</title>');
    printWindow.document.write('<style>\n'
        + 'body { font-family: Arial, sans-serif; margin: 20px; }\n'
        + 'table { width: 100%; border-collapse: collapse; font-size: 15px; background: #fff; box-shadow: 0 2px 8px #eee; }\n'
        + 'th { background: #f4f6fa; color: #333; font-weight: 600; padding: 10px; border: 1px solid #d1d5db; }\n'
        + 'td { padding: 10px; border: 1px solid #e5e7eb; color: #222; }\n'
        + 'tr:nth-child(even) { background: #f9fafb; }\n'
        + 'tr:hover { background: #e3e8ef; }\n'
        + '</style>');
    printWindow.document.write('</head><body >');
    printWindow.document.write(clone.outerHTML);
    printWindow.document.write('</body></html>');
    printWindow.document.close();
    printWindow.focus();
    printWindow.print();
    printWindow.close();
}
</script>

{{ block.super }}
{% endblock %}
